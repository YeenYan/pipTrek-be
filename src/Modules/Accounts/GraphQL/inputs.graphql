# Input for creating a new trading account
input CreateAccountInput {
    "Human-readable name for the account"
    name: String! @rules(apply: ["required", "string", "max:255"])

    "Broker name (e.g., IC Markets, Pepperstone)"
    broker: String! @rules(apply: ["required", "string", "max:255"])

    "Trading platform (e.g., MT4, MT5, cTrader)"
    platform: String @rules(apply: ["nullable", "string", "max:100"])

    "Account mode: demo or real"
    account_mode: String! @rules(apply: ["required", "in:demo,real"])

    "Account type offered by broker (e.g., Standard, ECN, Raw Spread)"
    account_type: String @rules(apply: ["nullable", "string", "max:100"])

    "Leverage ratio (e.g., 100.00 for 1:100)"
    leverage: Float! @rules(apply: ["required", "numeric", "min:1"])

    is_active: Boolean @rules(apply: ["sometimes", "boolean"])

    # UUIDs of securities to associate with this account
    "UUIDs of securities to associate with this account"
    security_ids: [ID!]
        @rules(apply: ["sometimes", "array"])
        @rulesForArray(apply: ["exists:securities,id"])
}

# Input for updating an existing trading account (all fields optional for partial updates)
input UpdateAccountInput {
    "Human-readable name for the account"
    name: String @rules(apply: ["sometimes", "string", "max:255"])

    "Broker name"
    broker: String @rules(apply: ["sometimes", "string", "max:255"])

    "Trading platform"
    platform: String @rules(apply: ["nullable", "string", "max:100"])

    "Account mode: demo or real"
    account_mode: String @rules(apply: ["sometimes", "in:demo,real"])

    "Account type offered by broker"
    account_type: String @rules(apply: ["nullable", "string", "max:100"])

    "Leverage ratio"
    leverage: Float @rules(apply: ["sometimes", "numeric", "min:1"])

    "Whether the account is actively tracked"
    is_active: Boolean @rules(apply: ["sometimes", "boolean"])

    "UUIDs of securities to sync for this account. Omit to leave unchanged; pass empty array to clear all."
    security_ids: [ID!]
        @rules(apply: ["sometimes", "array"])
        @rulesForArray(apply: ["exists:securities,id"])
}

# Input for creating a new account goal
input CreateAccountGoalInput {
    "UUID of the account this goal belongs to"
    account_id: ID! @rules(apply: ["required", "exists:accounts,id"])

    "Starting balance for the goal"
    starting_balance: Float! @rules(apply: ["required", "numeric", "min:0"])

    "Current balance for the goal"
    current_balance: Float! @rules(apply: ["required", "numeric", "min:0"])

    "Target amount for the goal"
    target_amount: Float! @rules(apply: ["required", "numeric", "min:0"])

    "Start date for the goal"
    start_date: String! @rules(apply: ["required", "date"])

    "End date for the goal"
    end_date: String @rules(apply: ["nullable", "date"])
}

# Input for updating an existing account goal (all fields optional for partial updates)
input UpdateAccountGoalInput {
    "Starting balance for the goal"
    starting_balance: Float @rules(apply: ["sometimes", "numeric", "min:0"])

    "Current balance for the goal"
    current_balance: Float @rules(apply: ["sometimes", "numeric", "min:0"])

    "Target amount for the goal"
    target_amount: Float @rules(apply: ["sometimes", "numeric", "min:0"])

    "Start date for the goal"
    start_date: String @rules(apply: ["sometimes", "date"])

    "End date for the goal"
    end_date: String @rules(apply: ["nullable", "date"])
}
