"""
Account Type Definition
Represents a trading account belonging to an authenticated user.
"""
type Account {
    id: ID!
    user_id: ID!
    name: String!
    broker: String!
    platform: String
    account_mode: String!
    account_type: String
    leverage: Float!
    is_active: Boolean!
    created_at: String!
    updated_at: String!

    "Securities associated with this account"
    securities: [Security!]!
}

"""
Account Response
Returned after creating, updating, or toggling an account.
"""
type AccountResponse {
    account: Account!
    message: String!
}

"""
Delete Account Response
Returned after successfully deleting an account.
"""
type DeleteAccountResponse {
    message: String!
}

"""
Account Goals Type Definition
Represents the financial goals associated with a trading account.
"""
type AccountGoal {
    id: ID!
    account_id: ID!
    starting_balance: Float!
    current_balance: Float
    target_amount: Float!
    start_date: String!
    end_date: String
}

type AccountGoalResponse {
    accountGoal: AccountGoal!
    message: String!
}
